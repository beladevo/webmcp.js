name: Publish Core

on:
  release:
    types: [published]
  push:
    tags:
      - "core-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @webmcp-js/core build
      - run: pnpm --filter @webmcp-js/core typecheck
      - run: pnpm --filter @webmcp-js/core test

      - name: Publish @webmcp-js/core
        run: pnpm --filter @webmcp-js/core publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
