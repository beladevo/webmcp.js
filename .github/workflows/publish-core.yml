name: Publish Core

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'release' && github.event.release.target_commitish == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @webmcp-js/core build
      - run: pnpm --filter @webmcp-js/core typecheck
      - run: pnpm --filter @webmcp-js/core test

      - name: Publish @webmcp-js/core
        run: npm publish --workspace @webmcp-js/core
